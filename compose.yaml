services:
  backend:
    build:
      context: ./backend
      target: development
    init: true
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: development
    init: true
    env_file:
      - ./frontend/.env.local
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_node_modules:
  frontend_node_modules:
